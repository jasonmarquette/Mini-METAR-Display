[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI
  bblanchon/ArduinoJson
  tzapu/WiFiManager

build_flags =
  -D USER_SETUP_LOADED=1
  -D GC9A01_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_MOSI=6
  -D TFT_SCLK=4
  -D TFT_CS=7
  -D TFT_DC=2
  -D TFT_RST=3
  -D TFT_BL=-1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SPI_FREQUENCY=40000000
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1